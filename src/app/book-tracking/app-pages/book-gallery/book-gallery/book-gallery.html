<section class="book-gallery" aria-label="Library">
  
  <div class="gallery-header">
    
    <div class="filter-buttons">
      <button class="filter-btn">All Books</button>
      <button class="filter-btn">Finished</button>
      <button class="filter-btn">Want To Read</button>
      <button class="filter-btn">In Progress</button>
    </div>
    
    <button class="btn-add" routerLink="/new-book"> Add New Book</button>
 
  </div>

  <div class="books-grid">
    @for (book of filteredBooks; track book.title) {
      <div class="book-card" [attr.data-status]="book.status">
        <h3>{{ book.title }}</h3>
        <p>{{ book.author }}</p>
        <span class="status">{{ book.status }}</span>
      </div>
    } @empty {
      <p>Nenhum livro ainda...</p>
    }
  </div>
  
</section>
