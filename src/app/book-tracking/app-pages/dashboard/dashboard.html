<main class="dashboard" role="main" aria-label="Dashboard"> 
  <section class="section last-book" aria-labelledby="last-book">
    <h2>Last Added Tale</h2>
    
    @if (lastBook) {
      <section class="featured-book" (click)="goToBookDetails(lastBook?.id)">
        <div class="book-cover">
          <img [src]="lastBook.photo" [alt]="'Book Cover of ' + lastBook.title">
        </div>
        <div class="featured-book-info">
          <h3>{{ lastBook.title }}</h3>
          <p class="author">{{ lastBook.author }}</p>
          <P class="status">{{ lastBook.status }}</P>
            @if (lastBook.rating && lastBook.rating > 0) {
              <p class="status-text">You rated this book: {{ lastBook.rating }}/5 💜</p>
            } 
        </div>
      </section>
    } @else {
      <div class="no-book-yet">
        <p>No adventures yet</p>
      </div>
    }
  </section>
  <app-dashboard-stats></app-dashboard-stats> 
</main>
