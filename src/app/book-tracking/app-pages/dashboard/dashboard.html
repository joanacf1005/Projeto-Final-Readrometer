<main class="dashboard" role="main" aria-label="Dashboard principal">  
 
  <section class="section last-book" aria-labelledby="ultimo-livro-title">
    <h2 id="ultimo-livro-title">Most Recent Tale</h2>
    <section class="featured-book">
      <div class="book-cover">
        <img src="" alt="1984 by George Orwell, bookcase">
      </div>
      <div class="featured-book-info">
        <h3>1984</h3>
        <p class="autor">George Orwell</p>
        <p class="progress">Concluded on 15/02/2026</p>
        <div class="rating">
          <span>★★★★★</span>
          <small>(5/5)</small>
        </div>
      </div>
    </section>
  </section>

 
  <section class="section statistics" aria-labelledby="stats-title">
    <h2 id="stats-title">Reading Insights</h2>
    <div class="stats-grid">
      <article class="stat-card" role="group" aria-label="Total of Books">
        <div class="stat-icon"></div>
        <div class="stat-info">
          <h3>47</h3>
          <p>Total Books In Your Collection</p>
        </div>
      </article>
      
      <article class="stat-card" role="group" aria-label="Completed">
        <div class="stat-icon"></div>
        <div class="stat-info">
          <h3>12</h3>
          <p>Stories Conquered</p>
        </div>
      </article>
      
      <article class="stat-card" role="group" aria-label="Reading">
        <div class="stat-icon"></div>
        <div class="stat-info">
          <h3>25</h3>
          <p>Open Chapters</p>
        </div>
      </article>
      
      <article class="stat-card" role="group" aria-label="Want to Read">
        <div class="stat-icon"></div>
        <div class="stat-info">
          <h3>10</h3>
          <p>Future Adventures</p>
        </div>
      </article>
    </div>
  </section>

</main>
